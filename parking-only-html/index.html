<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tilal Mall — 3D Ground Floor Parking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:#eaf2ff;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(99,179,255,.40), transparent 60%),
    radial-gradient(1000px 700px at 110% 10%, rgba(56,120,255,.34), transparent 55%),
    linear-gradient(160deg,#0a2a6b 0%, #0c3a8f 35%, #08409c 60%, #052a66 100%);
}
#scene{position:fixed;inset:0;display:block;cursor:grab;}
#scene.grabbing{cursor:grabbing;}

/* top bar */
.topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 18px;z-index:10;}
.brand{display:flex;align-items:center;gap:12px;background:rgba(8,22,48,.55);border:1px solid rgba(150,190,255,.2);
  backdrop-filter:blur(14px);border-radius:16px;padding:10px 16px;}
.logo{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:18px;
  background:linear-gradient(135deg,#6db4ff,#2f6dff);box-shadow:inset 0 0 18px rgba(255,255,255,.25);}
.brand h1{font-size:16px;letter-spacing:.04em;}
.brand p{font-size:11px;color:#a9c2e6;margin-top:2px;}
.spacer{flex:1;}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(8,22,48,.55);border:1px solid rgba(150,190,255,.2);
  backdrop-filter:blur(14px);border-radius:14px;padding:10px 14px;min-width:270px;}
.search-box input{background:transparent;border:0;outline:0;color:#eaf2ff;width:100%;font-size:14px;}
.search-box input::placeholder{color:#88a4d0;}
.btn{border:1px solid rgba(150,190,255,.2);border-radius:14px;padding:11px 16px;font-size:13px;font-weight:700;
  cursor:pointer;color:#eaf2ff;background:rgba(8,22,48,.55);backdrop-filter:blur(14px);transition:.2s;white-space:nowrap;}
.btn:hover{transform:translateY(-1px);background:rgba(30,70,140,.7);}
.btn.primary{background:linear-gradient(135deg,#22c55e,#15a34a);border-color:transparent;color:#04230f;}
.btn.primary.checked{background:linear-gradient(135deg,#f59e0b,#d97706);color:#2b1500;}

/* stats + legend */
.hud{position:fixed;top:78px;left:18px;z-index:10;display:flex;flex-direction:column;gap:10px;}
.stats{display:flex;gap:8px;}
.stat{background:rgba(8,22,48,.55);border:1px solid rgba(150,190,255,.2);backdrop-filter:blur(14px);
  border-radius:14px;padding:10px 14px;min-width:78px;}
.stat b{display:block;font-size:20px;}
.stat span{font-size:10px;color:#a9c2e6;text-transform:uppercase;letter-spacing:.1em;}
.stat.green b{color:#5af08a;}.stat.red b{color:#ff7a7a;}
.legend{background:rgba(8,22,48,.55);border:1px solid rgba(150,190,255,.2);backdrop-filter:blur(14px);
  border-radius:14px;padding:10px 14px;font-size:12px;color:#c7d8f5;display:flex;flex-direction:column;gap:6px;}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block;vertical-align:-2px;margin-right:6px;}

/* slot info panel */
.panel{position:fixed;right:18px;top:78px;width:300px;z-index:10;background:rgba(8,22,48,.7);
  border:1px solid rgba(150,190,255,.25);backdrop-filter:blur(16px);border-radius:18px;padding:20px;
  box-shadow:0 24px 60px rgba(0,0,0,.4);transform:translateX(120%);transition:transform .35s;}
.panel.open{transform:translateX(0);}
.panel h2{font-size:34px;letter-spacing:.04em;}
.panel .sub{color:#a9c2e6;font-size:13px;margin:2px 0 16px;}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;font-weight:800;font-size:14px;}
.pill.free{background:rgba(34,197,94,.2);color:#7af0a0;border:1px solid rgba(34,197,94,.5);}
.pill.busy{background:rgba(239,68,68,.2);color:#ff9a9a;border:1px solid rgba(239,68,68,.5);}
.pill.unknown{background:rgba(148,163,184,.2);color:#cbd5e1;border:1px solid rgba(148,163,184,.4);}
.kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;}
.kv span:first-child{color:#a9c2e6;}.kv span:last-child{font-weight:700;}
.panel .x{position:absolute;top:14px;right:16px;cursor:pointer;color:#a9c2e6;font-size:20px;}
.panel .focus{margin-top:16px;width:100%;text-align:center;}

/* help + toast */
.help{position:fixed;left:18px;bottom:16px;z-index:10;font-size:12px;color:#bcd0f0;background:rgba(8,22,48,.5);
  border:1px solid rgba(150,190,255,.18);border-radius:12px;padding:8px 14px;backdrop-filter:blur(10px);}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(140%);background:#0e2a5e;
  border:1px solid rgba(150,190,255,.25);padding:12px 22px;border-radius:14px;font-size:14px;font-weight:600;
  box-shadow:0 20px 40px rgba(0,0,0,.4);transition:transform .35s;z-index:20;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loader{position:fixed;inset:0;display:grid;place-items:center;z-index:30;font-size:15px;color:#cfe0ff;
  background:rgba(5,18,45,.6);}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="topbar">
  <div class="brand">
    <div class="logo">P</div>
    <div><h1>TILAL MALL · 3D GROUND PARKING</h1><p>262 bays · zones A–J · navigate freely</p></div>
  </div>
  <div class="spacer"></div>
  <div class="search-box"><span>🔎</span>
    <input id="search" type="text" placeholder="Search plate or slot (e.g. A03, DXB...)" autocomplete="off"/>
  </div>
  <button class="btn" id="clearBtn">Clear</button>
  <button class="btn primary" id="availBtn">Check availability</button>
  <button class="btn" id="resetBtn">Reset view</button>
  <button class="btn" id="topBtn">Top view</button>
</div>

<div class="hud">
  <div class="stats">
    <div class="stat"><b id="totalStat">262</b><span>Total</span></div>
    <div class="stat green"><b id="freeStat">—</b><span>Free</span></div>
    <div class="stat red"><b id="busyStat">—</b><span>Busy</span></div>
  </div>
  <div class="legend">
    <span><i style="background:#cdd7e8"></i>Unknown — run availability</span>
    <span><i style="background:#22c55e"></i>Free &nbsp; <i style="background:#ef4444"></i>Busy</span>
  </div>
</div>

<div class="panel" id="panel">
  <div class="x" id="panelX">✕</div>
  <h2 id="pName">A01</h2>
  <div class="sub" id="pZone">Zone A · Ground floor</div>
  <div id="pStatus"></div>
  <div style="margin-top:14px">
    <div class="kv"><span>Slot ID</span><span id="pId">—</span></div>
    <div class="kv"><span>Zone</span><span id="pZoneV">—</span></div>
    <div class="kv"><span>Status</span><span id="pStatusV">—</span></div>
    <div class="kv" id="pPlateRow"><span>Vehicle plate</span><span id="pPlate">—</span></div>
  </div>
  <button class="btn focus" id="focusBtn">Fly to this bay</button>
</div>

<div class="help">🖱️ Left-drag orbit · right-drag pan · scroll zoom · click a bay</div>
<div class="toast" id="toast"></div>
<div class="loader" id="loader">Loading 3D parking…</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

/* ---------- data ---------- */
const ZONES=[
  {id:'A',count:14},{id:'B',count:28},{id:'C',count:24},{id:'D',count:20},{id:'E',count:32},
  {id:'F',count:24},{id:'G',count:28},{id:'H',count:24},{id:'I',count:16},{id:'J',count:52}
];
const slots=[];
let availabilityChecked=false, selected=null;
ZONES.forEach(z=>{for(let i=1;i<=z.count;i++)slots.push({id:z.id+String(i).padStart(2,'0'),zone:z.id,busy:false,plate:null,match:false});});

function randomPlate(){
  const codes='ABCDEFGHIJKLMNOPQRST'.split('');
  return 'DXB '+codes[Math.floor(Math.random()*codes.length)]+' '+Math.floor(1000+Math.random()*89000);
}
function assignBusy(){
  slots.forEach(s=>{s.busy=false;s.plate=null;});
  const idx=[...slots.keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  for(let k=0;k<50;k++){slots[idx[k]].busy=true;slots[idx[k]].plate=randomPlate();}
}
assignBusy();

/* ---------- three.js setup ---------- */
const canvas=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x0a3a8a,180,520);

const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,2000);
const HOME={pos:new THREE.Vector3(0,120,160),tgt:new THREE.Vector3(0,0,0)};
camera.position.copy(HOME.pos);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.08;
controls.maxPolarAngle=Math.PI*0.49;controls.minDistance=12;controls.maxDistance=420;
controls.target.copy(HOME.tgt);

/* lights */
scene.add(new THREE.HemisphereLight(0xbcd6ff,0x20304a,0.9));
const sun=new THREE.DirectionalLight(0xffffff,1.1);
sun.position.set(80,160,60);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
const d=260;Object.assign(sun.shadow.camera,{left:-d,right:d,top:d,bottom:-d,near:1,far:600});
scene.add(sun);

/* ---------- layout geometry ---------- */
const SLOT_W=4, SLOT_L=8, GAP=0.5, COL_GAP=1, LANE=12, ZONE_GAP=14;
const slotW=SLOT_W, slotL=SLOT_L;

// compute total width to center
function zoneWidth(){return SLOT_W*2+COL_GAP+LANE;}
let totalW=0;
ZONES.forEach((z,i)=>{totalW+=zoneWidth()+(i<ZONES.length-1?ZONE_GAP:0);});

/* ground / asphalt */
const groundW=totalW+60;
const maxCount=Math.max(...ZONES.map(z=>z.count));
const colLen=Math.ceil(maxCount/2)*(SLOT_L+GAP);
const groundL=colLen+70;
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(groundW,groundL),
  new THREE.MeshStandardMaterial({color:0x2c3340,roughness:.95})
);
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

/* outer kerb */
const kerb=new THREE.Mesh(new THREE.BoxGeometry(groundW+4,1.4,groundL+4),
  new THREE.MeshStandardMaterial({color:0x1a2030,roughness:1}));
kerb.position.y=-0.7;scene.add(kerb);

/* slot canvas texture helper */
function makeSlotTexture(slot){
  const c=document.createElement('canvas');c.width=128;c.height=256;
  const ctx=c.getContext('2d');
  slot._c=c;slot._ctx=ctx;
  const tex=new THREE.CanvasTexture(c);
  tex.anisotropy=4;
  slot._tex=tex;
  drawSlot(slot);
  return tex;
}
function drawSlot(slot){
  const ctx=slot._ctx;const W=128,H=256;
  ctx.clearRect(0,0,W,H);
  let top,bot,txt;
  if(!availabilityChecked){top='#eef2f9';bot='#cdd7e8';txt='#0a1830';}
  else if(slot.busy){top='#f87171';bot='#dc2626';txt='#2b0606';}
  else{top='#4ade80';bot='#16a34a';txt='#05260f';}
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,top);g.addColorStop(1,bot);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // border
  ctx.lineWidth=10;ctx.strokeStyle=slot.match?'#ffd54a':(slot===selected?'#ffffff':'rgba(255,255,255,.65)');
  ctx.strokeRect(5,5,W-10,H-10);
  // id text
  ctx.fillStyle=txt;ctx.font='bold 46px Inter,Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-Math.PI/2);ctx.fillText(slot.id,0,0);ctx.restore();
  if(slot._tex)slot._tex.needsUpdate=true;
}

/* zone label sprite */
function makeLabel(text){
  const c=document.createElement('canvas');c.width=256;c.height=128;
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(47,109,255,.92)';roundRect(ctx,8,30,240,68,18);ctx.fill();
  ctx.fillStyle='#eaf3ff';ctx.font='bold 70px Inter,Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,128,66);
  const tex=new THREE.CanvasTexture(c);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false}));
  sp.scale.set(14,7,1);
  return sp;
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

/* build slots in the scene */
const slotMeshes=[];
const slotGeo=new THREE.BoxGeometry(slotW,0.4,slotL);
let xCursor=-totalW/2;
ZONES.forEach(z=>{
  const zoneSlots=slots.filter(s=>s.zone===z.id);
  const half=Math.ceil(zoneSlots.length/2);
  const colAx=xCursor+SLOT_W/2;
  const colBx=xCursor+SLOT_W+COL_GAP+LANE+SLOT_W/2;
  const colLenA=half*(SLOT_L+GAP);
  const startZ=-colLenA/2;

  zoneSlots.forEach((s,i)=>{
    const inA=i<half;
    const col=inA?i:i-half;
    const x=inA?colAx:colBx;
    const zc=startZ+col*(SLOT_L+GAP)+SLOT_L/2;
    const tex=makeSlotTexture(s);
    const mats=[
      new THREE.MeshStandardMaterial({color:0x223,roughness:1}),
      new THREE.MeshStandardMaterial({color:0x223,roughness:1}),
      new THREE.MeshStandardMaterial({map:tex,roughness:.6}), // top
      new THREE.MeshStandardMaterial({color:0x223,roughness:1}),
      new THREE.MeshStandardMaterial({color:0x223,roughness:1}),
      new THREE.MeshStandardMaterial({color:0x223,roughness:1}),
    ];
    const m=new THREE.Mesh(slotGeo,mats);
    m.position.set(x,0.2,zc);
    m.castShadow=true;m.receiveShadow=true;
    m.userData.slot=s;
    s._mesh=m;s._pos=new THREE.Vector3(x,0,zc);
    scene.add(m);slotMeshes.push(m);
  });

  // zone label floating above middle
  const lbl=makeLabel(z.id);
  lbl.position.set((colAx+colBx)/2,10,startZ-9);
  scene.add(lbl);

  // lane stripe
  const lane=new THREE.Mesh(new THREE.PlaneGeometry(LANE-1,colLenA+SLOT_L),
    new THREE.MeshStandardMaterial({color:0x363d4c,roughness:1}));
  lane.rotation.x=-Math.PI/2;lane.position.set((colAx+colBx)/2,0.02,0);scene.add(lane);

  xCursor+=zoneWidth()+ZONE_GAP;
});

/* car boxes for occupied slots (added on availability) */
const carGroup=new THREE.Group();scene.add(carGroup);
function buildCars(){
  carGroup.clear();
  if(!availabilityChecked)return;
  slots.filter(s=>s.busy).forEach(s=>{
    const hue=Math.random();
    const col=new THREE.Color().setHSL(hue,.5,.5);
    const body=new THREE.Mesh(new THREE.BoxGeometry(slotW*0.7,1.6,slotL*0.78),
      new THREE.MeshStandardMaterial({color:col,roughness:.4,metalness:.3}));
    body.position.set(s._pos.x,1.1,s._pos.z);body.castShadow=true;
    const cabin=new THREE.Mesh(new THREE.BoxGeometry(slotW*0.6,1,slotL*0.4),
      new THREE.MeshStandardMaterial({color:0x111418,roughness:.2,metalness:.6}));
    cabin.position.set(s._pos.x,2.1,s._pos.z);cabin.castShadow=true;carGroup.add(body);carGroup.add(cabin);
  });
}

/* ---------- interaction ---------- */
const ray=new THREE.Raycaster();const mouse=new THREE.Vector2();
let hovered=null;
function setPointer(e){const r=canvas.getBoundingClientRect();mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;}

let downX,downY,moved=false;
canvas.addEventListener('pointerdown',e=>{downX=e.clientX;downY=e.clientY;moved=false;canvas.classList.add('grabbing');});
canvas.addEventListener('pointerup',()=>canvas.classList.remove('grabbing'));
canvas.addEventListener('pointermove',e=>{
  if(downX!==undefined&&(Math.abs(e.clientX-downX)>4||Math.abs(e.clientY-downY)>4))moved=true;
  setPointer(e);
});
canvas.addEventListener('click',e=>{
  if(moved)return; // was a drag
  setPointer(e);
  ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(slotMeshes,false)[0];
  if(hit)selectSlot(hit.object.userData.slot);
});

/* hover highlight */
function updateHover(){
  ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(slotMeshes,false)[0];
  const m=hit?hit.object:null;
  if(hovered&&hovered!==m)hovered.scale.set(1,1,1);
  if(m){m.scale.set(1.06,1.6,1.06);canvas.style.cursor='pointer';}
  else canvas.style.cursor='';
  hovered=m;
}

/* ---------- UI ---------- */
const panel=document.getElementById('panel');
function selectSlot(s){
  if(selected)drawSlot(selected);
  selected=s;drawSlot(s);
  document.getElementById('pName').textContent=s.id;
  document.getElementById('pZone').textContent='Zone '+s.zone+' · Ground floor';
  document.getElementById('pId').textContent=s.id;
  document.getElementById('pZoneV').textContent='Zone '+s.zone;
  const sb=document.getElementById('pStatus'),pr=document.getElementById('pPlateRow');
  if(!availabilityChecked){
    sb.innerHTML='<span class="pill unknown">● Status hidden</span>';
    document.getElementById('pStatusV').textContent='Unknown';pr.style.display='none';
  }else if(s.busy){
    sb.innerHTML='<span class="pill busy">● Occupied</span>';
    document.getElementById('pStatusV').textContent='Busy';
    document.getElementById('pPlate').textContent=s.plate;pr.style.display='flex';
  }else{
    sb.innerHTML='<span class="pill free">● Available</span>';
    document.getElementById('pStatusV').textContent='Free';pr.style.display='none';
  }
  panel.classList.add('open');
}
document.getElementById('panelX').onclick=()=>{panel.classList.remove('open');if(selected){const s=selected;selected=null;drawSlot(s);}};
document.getElementById('focusBtn').onclick=()=>{if(selected)flyTo(selected._pos);};

/* availability */
const availBtn=document.getElementById('availBtn');
availBtn.onclick=()=>{
  availabilityChecked=!availabilityChecked;
  availBtn.textContent=availabilityChecked?'Hide availability':'Check availability';
  availBtn.classList.toggle('checked',availabilityChecked);
  slots.forEach(drawSlot);
  buildCars();
  updateStats();
  toast(availabilityChecked?'Availability loaded · 50 bays occupied':'Availability hidden');
  if(selected)selectSlot(selected);
};
function updateStats(){
  if(availabilityChecked){
    const busy=slots.filter(s=>s.busy).length;
    document.getElementById('busyStat').textContent=busy;
    document.getElementById('freeStat').textContent=slots.length-busy;
  }else{document.getElementById('busyStat').textContent='—';document.getElementById('freeStat').textContent='—';}
}

/* search */
const searchEl=document.getElementById('search');
searchEl.addEventListener('input',doSearch);
function doSearch(){
  const q=searchEl.value.trim().toUpperCase().replace(/\s+/g,'');
  let matches=[];
  slots.forEach(s=>{
    const plate=(s.plate||'').toUpperCase().replace(/\s+/g,'');
    const hit=s.id.includes(q)||(availabilityChecked&&plate&&plate.includes(q));
    if(q&&hit){s.match=true;matches.push(s);}else s.match=false;
    drawSlot(s);
  });
  if(q&&matches.length===0)toast('No match for "'+searchEl.value+'"');
  if(matches.length>=1){flyTo(matches[0]._pos);if(matches.length===1)selectSlot(matches[0]);}
}
document.getElementById('clearBtn').onclick=()=>{searchEl.value='';doSearch();};

/* camera moves */
let anim=null;
function flyTo(pos,dist=34,height=26){
  const tgt=pos.clone();
  const camPos=new THREE.Vector3(pos.x,height,pos.z+dist);
  anim={t:0,fromT:controls.target.clone(),toT:tgt,fromC:camera.position.clone(),toC:camPos};
}
function easeTo(home){anim={t:0,fromT:controls.target.clone(),toT:home.tgt.clone(),fromC:camera.position.clone(),toC:home.pos.clone()};}
document.getElementById('resetBtn').onclick=()=>easeTo(HOME);
document.getElementById('topBtn').onclick=()=>easeTo({pos:new THREE.Vector3(0,260,1),tgt:new THREE.Vector3(0,0,0)});

/* toast */
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}

/* resize */
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

/* loop */
function tick(){
  if(anim){
    anim.t=Math.min(1,anim.t+0.035);
    const e=1-Math.pow(1-anim.t,3);
    controls.target.lerpVectors(anim.fromT,anim.toT,e);
    camera.position.lerpVectors(anim.fromC,anim.toC,e);
    if(anim.t>=1)anim=null;
  }
  updateHover();
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
updateStats();
document.getElementById('loader').style.display='none';
tick();
</script>
</body>
</html>
