<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f3d3a6">
<title>Tilal Mall — 3D Floor Plan</title>
<style>
  /* ---- golden-hour background: soft blue sky fading to a warm peach horizon.
         Painted in CSS behind a transparent WebGL canvas (no noisy texture). ---- */
  :root{
    --ink:#2c2f38; --ink-soft:#5b606e;
    --glass:rgba(255,255,255,.16); --glass-strong:rgba(255,255,255,.30);
    --stroke:rgba(255,255,255,.45); --shadow:0 10px 34px rgba(60,44,24,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(120% 90% at 78% 6%, rgba(255,239,206,.55) 0%, rgba(255,239,206,0) 46%),
      linear-gradient(180deg,#a7c1e4 0%, #bccbe2 26%, #e7d6c2 60%, #f6d3a4 84%, #f4c188 100%);
  }
  #app{position:fixed; inset:0;}
  canvas{display:block; touch-action:none;}

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed; left:0; right:0; top:0; z-index:6;
    display:flex; align-items:center; gap:10px;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 10px;
    pointer-events:none;
  }
  .brand{
    pointer-events:auto; display:flex; align-items:center; gap:9px;
    padding:8px 13px; border-radius:14px;
    background:var(--glass); border:1px solid var(--stroke);
    backdrop-filter:blur(16px) saturate(130%); -webkit-backdrop-filter:blur(16px) saturate(130%);
    box-shadow:var(--shadow);
  }
  .brand .mark{width:20px;height:20px;border-radius:6px;
    background:linear-gradient(135deg,#f6c885,#c98f4a); box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);}
  .brand b{font-size:15px; letter-spacing:.04em; font-weight:700;}
  .brand span{font-size:11px; color:var(--ink-soft); letter-spacing:.06em; text-transform:uppercase;}
  .spacer{flex:1;}

  /* segmented floor switcher */
  .floors{
    pointer-events:auto; display:flex; gap:3px; padding:4px; border-radius:14px;
    background:var(--glass); border:1px solid var(--stroke);
    backdrop-filter:blur(16px) saturate(130%); -webkit-backdrop-filter:blur(16px) saturate(130%);
    box-shadow:var(--shadow);
  }
  .floors button{
    appearance:none; border:0; cursor:pointer; font:inherit; font-weight:600;
    color:var(--ink-soft); background:transparent; border-radius:10px;
    padding:8px 12px; min-width:40px; transition:.18s; line-height:1; font-size:13px;
  }
  .floors button .lvl{font-size:15px; font-weight:700; display:block;}
  .floors button .nm{font-size:9px; letter-spacing:.05em; text-transform:uppercase; opacity:.75;}
  .floors button.active{background:rgba(255,255,255,.62); color:var(--ink); box-shadow:0 4px 12px rgba(70,52,28,.14);}

  /* ---------- hint ---------- */
  .hint{
    position:fixed; left:50%; transform:translateX(-50%); bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
    z-index:5; pointer-events:none; font-size:12px; color:var(--ink-soft);
    background:var(--glass); border:1px solid var(--stroke); border-radius:999px;
    padding:7px 14px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:var(--shadow); opacity:0; transition:opacity .6s; white-space:nowrap;
  }
  .hint.show{opacity:1;}

  /* ---------- legend ---------- */
  .legend{
    position:fixed; left:12px; bottom:calc(env(safe-area-inset-bottom,0px) + 12px); z-index:6;
    width:min(230px,72vw); border-radius:16px; overflow:hidden;
    background:var(--glass); border:1px solid var(--stroke);
    backdrop-filter:blur(16px) saturate(130%); -webkit-backdrop-filter:blur(16px) saturate(130%);
    box-shadow:var(--shadow); transition:.25s;
  }
  .legend .lg-head{
    display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
    padding:11px 13px; font-weight:600; font-size:13px;
  }
  .legend .lg-head .chev{margin-left:auto; transition:.25s; opacity:.6;}
  .legend.collapsed .lg-body{display:none;}
  .legend.collapsed .lg-head .chev{transform:rotate(180deg);}
  .legend.cardopen{transform:translateY(180%); opacity:0; pointer-events:none;}  /* mobile: yield to info card */
  .legend .lg-body{max-height:42vh; overflow:auto; padding:2px 6px 8px;}
  .legend .row{
    display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:9px; cursor:pointer;
    font-size:12.5px; transition:.15s;
  }
  .legend .row:hover{background:rgba(255,255,255,.28);}
  .legend .row.off{opacity:.4;}
  .legend .sw{width:13px;height:13px;border-radius:4px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
  .legend .row .nm{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .legend .row .ct{color:var(--ink-soft); font-variant-numeric:tabular-nums; font-size:11.5px;}

  /* ---------- info card ---------- */
  .card{
    position:fixed; z-index:7; left:12px; right:12px;
    bottom:calc(env(safe-area-inset-bottom,0px) + 12px);
    border-radius:22px; overflow:hidden;
    background:var(--glass-strong); border:1px solid var(--stroke);
    backdrop-filter:blur(22px) saturate(150%); -webkit-backdrop-filter:blur(22px) saturate(150%);
    box-shadow:var(--shadow);
    transform:translateY(150%); opacity:0; transition:transform .36s cubic-bezier(.2,.8,.2,1), opacity .36s;
  }
  .card.show{transform:translateY(0); opacity:1;}
  .card .hero{position:relative; height:150px; background:linear-gradient(135deg,#cbb98f,#9a7b48);}
  .card .hero img{width:100%; height:100%; object-fit:cover; display:block;}
  .card .hero-grad{position:absolute; inset:0; background:linear-gradient(180deg,rgba(20,24,33,.30) 0,rgba(20,24,33,0) 30%,rgba(20,24,33,.05) 52%,rgba(20,24,33,.74) 100%);}
  .card .chip{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; padding:6px 10px; border-radius:9px; background:rgba(255,255,255,.88); color:#33384a; box-shadow:0 2px 8px rgba(40,30,16,.18);}
  .card .cat-chip{position:absolute; top:12px; left:12px;}
  .card .cat-chip .cdot{width:11px;height:11px;border-radius:3px;}
  .card .code-chip{background:rgba(30,52,90,.88); color:#fff; letter-spacing:.06em;}
  .card .hero-tr{position:absolute; top:12px; right:12px; display:flex; align-items:center; gap:8px;}
  .card .close{cursor:pointer; border:0; background:rgba(255,255,255,.92); color:#33384a; width:30px;height:30px;border-radius:50%; font-size:18px; line-height:1; flex:0 0 auto; box-shadow:0 2px 8px rgba(40,30,16,.18);}
  .card .hero-title{position:absolute; left:16px; right:16px; bottom:12px; color:#fff;}
  .card .hero-title h2{margin:0; font-size:20px; font-weight:700; letter-spacing:.01em; text-shadow:0 1px 10px rgba(0,0,0,.45);}
  .card .hero-title .cat{margin:2px 0 0; font-size:12.5px; opacity:.92; letter-spacing:.02em; text-shadow:0 1px 8px rgba(0,0,0,.4);}
  .card-body{padding:14px 16px 16px;}
  .card .desc{margin:0 0 12px; font-size:13px; line-height:1.5; color:var(--ink-soft);
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .card .meta{display:flex; gap:8px; flex-wrap:wrap;}
  .card .pill{font-size:12px; color:var(--ink); background:rgba(255,255,255,.46);
    border:1px solid rgba(255,255,255,.55); border-radius:999px; padding:6px 11px; font-variant-numeric:tabular-nums;}
  .card .pill b{font-weight:700; color:var(--ink-soft);}
  .card .actions{display:flex; gap:9px; margin-top:14px;}
  .card .act{flex:1; cursor:pointer; border:1px solid rgba(255,255,255,.55); border-radius:13px;
    padding:11px 12px; font:inherit; font-size:13px; font-weight:600; color:var(--ink); background:rgba(255,255,255,.42);
    display:flex; align-items:center; justify-content:center; gap:7px; transition:.16s;}
  .card .act:hover{background:rgba(255,255,255,.62);}
  .card .act svg{width:16px;height:16px;}
  .card .act.primary{color:#fff; border-color:transparent; background:linear-gradient(135deg,#3f74c0,#2f5391);}
  .card .act.primary:hover{filter:brightness(1.06);}

  /* ---------- toast ---------- */
  #toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + 96px); transform:translate(-50%,12px);
    z-index:12; pointer-events:none; opacity:0; transition:.25s; font-size:13px; color:#fff;
    background:rgba(34,40,54,.92); border-radius:999px; padding:10px 18px; box-shadow:var(--shadow); white-space:nowrap;}
  #toast.show{opacity:1; transform:translate(-50%,0);}

  /* ---------- loader ---------- */
  #loader{
    position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    background:linear-gradient(180deg,#bccbe2,#f4c188); transition:opacity .6s; color:var(--ink);
  }
  #loader.hide{opacity:0; pointer-events:none;}
  .ring{width:46px;height:46px;border-radius:50%;
    border:3px solid rgba(255,255,255,.45); border-top-color:#c98f4a; animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader .lbl{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#6a5636;}
  #loader .err{display:none; max-width:300px; text-align:center; font-size:13px; line-height:1.5; color:#7a3b2a;}

  /* ---------- desktop refinements ---------- */
  @media (min-width:760px){
    .brand b{font-size:17px;}
    .card{left:auto; right:18px; bottom:18px; width:360px;}
    .card .hero{height:168px;}
    .legend{width:248px;}
    .hint{font-size:12.5px;}
  }
  @media (prefers-reduced-motion:reduce){
    .card{transition:none;} .ring{animation-duration:2.4s;}
  }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="topbar">
    <div class="brand"><span class="mark"></span><div><b>Tilal Mall</b><br><span>3D Plan</span></div></div>
    <div class="spacer"></div>
    <div class="floors" id="floors"></div>
  </div>

  <div class="legend collapsed" id="legend">
    <div class="lg-head" id="lgHead">Categories
      <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
    </div>
    <div class="lg-body" id="lgBody"></div>
  </div>

  <div class="hint" id="hint">Drag to orbit · pinch to zoom · tap a unit</div>

  <div class="card" id="card">
    <div class="hero" id="cHero">
      <img id="cImg" alt="" draggable="false"/>
      <div class="hero-grad"></div>
      <span class="chip cat-chip"><span class="cdot" id="cDot"></span><span id="cTag">—</span></span>
      <div class="hero-tr">
        <span class="chip code-chip" id="cCode"></span>
        <button class="close" id="cClose" aria-label="Close">×</button>
      </div>
      <div class="hero-title"><h2 id="cName">—</h2><p class="cat" id="cCat">—</p></div>
    </div>
    <div class="card-body">
      <p class="desc" id="cDesc"></p>
      <div class="meta" id="cMeta"></div>
      <div class="actions">
        <button class="act primary" id="cLocate" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>Locate</button>
        <button class="act" id="cShare" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.3 10.8l7.4-4.3M8.3 13.2l7.4 4.3"/></svg>Share</button>
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <div id="loader">
    <div class="ring" id="spinner"></div>
    <div class="lbl" id="loadLbl">Building 3D model…</div>
    <div class="err" id="loadErr">Couldn’t load the 3D engine. This viewer needs an internet connection the first time (it fetches Three.js from a CDN).</div>
  </div>

<script>
/* ============================================================================
   Tilal Mall — 3D floor-plan viewer (single file, classic <script>, file://-safe)
   Baked polygon data per floor is injected below. We build THREE.Shapes from the
   pre-simplified points, extrude them with a soft bevel, light the scene for a
   warm golden hour, and let you orbit / tap units.
   ========================================================================== */
var FLOORS = __FLOORDATA__;

/* per-category look: label, soft palette colour, extrude height, group */
/* per-category look + copy. c=colour, h=extrude height in world units — kept
   in a tight 1.6–9 band so a tall anchor never hides a small restroom. The
   golden (amber) and blue families are saturated so they read distinctly.
   t=tag, d=description for the info card. */
var CAT = {
  hypermarket:{l:"Hypermarket",c:0xe3d4b0,h:9,g:"lease",t:"Anchor Hypermarket",d:"An expansive hypermarket anchor for everyday essentials, fresh produce and household needs."},
  "hyper-store":{l:"Hypermarket Storage",c:0xd4ccb6,h:3.5,g:"fac",t:"Hypermarket Storage",d:"Back-of-house storage serving the hypermarket anchor."},
  anchor:{l:"Anchor Store",c:0x325b97,h:9,g:"lease",t:"Anchor Store",d:"A flagship anchor store drawing footfall across the mall."},
  "mini-major":{l:"Mini-Major",c:0x6184bb,h:7,g:"lease",t:"Mini-Major Store",d:"Larger-format mini-major stores across fashion and lifestyle."},
  "line-shop":{l:"Retail Shop",c:0xb3c8e8,h:5,g:"lease",t:"Line Shop",d:"In-line retail boutiques presenting fashion, lifestyle and specialty brands."},
  fnb:{l:"Restaurant",c:0xd28e26,h:5.5,g:"lease",t:"Dining & Restaurants",d:"Signature restaurants serving international and regional cuisine."},
  "fnb-cafe":{l:"Café",c:0xe0a73f,h:5,g:"lease",t:"Café & Bakery",d:"Relaxed cafés, bakeries and coffee houses for a casual break."},
  "fnb-kiosk":{l:"F&B Kiosk",c:0xcc8f2c,h:4.5,g:"lease",t:"F&B Kiosk",d:"Grab-and-go food kiosks and counters serving quick bites."},
  "fnb-seating":{l:"F&B Seating",c:0xecd6a0,h:3.5,g:"lease",t:"F&B Seating",d:"Comfortable shared dining seating beside the F&B outlets."},
  kiosk:{l:"Kiosk",c:0xbd8528,h:4.5,g:"lease",t:"Retail Kiosk",d:"Compact retail kiosks and pop-ups lining the concourse."},
  "kiosk-seating":{l:"Kiosk Seating",c:0xc8d9f0,h:3.5,g:"lease",t:"Kiosk Seating",d:"Shared seating alongside the food and retail kiosks."},
  "food-village":{l:"Food Village",c:0xd99e35,h:5.5,g:"lease",t:"Food Village",d:"A lively food village bringing together a world of flavours."},
  "food-court":{l:"Food Court",c:0xd28e26,h:5.5,g:"lease",t:"Food Court Hall",d:"The central food court hall, a vibrant dining destination."},
  "fc-seating":{l:"Food Court Seating",c:0xecd6a0,h:3.5,g:"lease",t:"Food Court Seating",d:"Light-filled food court seating at the heart of dining."},
  fec:{l:"Family Entertainment",c:0x5479b6,h:7,g:"lease",t:"Family Entertainment",d:"Games, rides and attractions for the whole family."},
  cinema:{l:"Cinema",c:0x2b4d8c,h:9,g:"lease",t:"Cineplex",d:"A multi-screen cineplex showing the latest blockbusters."},
  "customer-service":{l:"Customer Service",c:0xdccfb2,h:5,g:"fac",t:"Guest Services",d:"Guest services and amenities for a seamless visit."},
  "management-suite":{l:"Management",c:0xbfccdd,h:5,g:"fac",t:"Mall Management",d:"Mall management offices and administration suites."},
  "tenant-store":{l:"Storage",c:0xcec5ad,h:3.5,g:"fac",t:"Tenant Storage",d:"Dedicated tenant storage and stockrooms."},
  "prayer-room":{l:"Prayer Room",c:0xe1dac4,h:4.5,g:"fac",t:"Prayer Facilities",d:"Quiet prayer rooms with ablution facilities."},
  circulation:{l:"Circulation",c:0xedeff3,h:1.6,g:"fac",t:"Concourse & Circulation",d:"Concourses, corridors and vertical circulation connecting the mall."},
  mep:{l:"Building Services",c:0xd1cec2,h:3,g:"fac",t:"MEP / Services",d:"Mechanical, electrical and plumbing plant serving the building."},
  boh:{l:"Back of House",c:0xd5d1c2,h:3,g:"fac",t:"Back of House",d:"Back-of-house service and support spaces."},
  toilet:{l:"Restroom",c:0xafbed4,h:4.5,g:"fac",t:"Restrooms",d:"Premium guest restroom facilities, conveniently located."},
  /* legacy aliases so any stray value still renders */
  hyper:{l:"Hypermarket",c:0xe3d4b0,h:9,g:"lease",t:"Anchor Hypermarket",d:"An expansive hypermarket anchor."},
  retail:{l:"Retail Shop",c:0xb3c8e8,h:5,g:"lease",t:"Line Shop",d:"In-line retail boutiques."},
  specialty:{l:"Retail Shop",c:0xb3c8e8,h:5,g:"lease",t:"Line Shop",d:"In-line retail boutiques."},
  "specialty-retail":{l:"Retail Shop",c:0xb3c8e8,h:5,g:"lease",t:"Line Shop",d:"In-line retail boutiques."},
  seating:{l:"Food Court Seating",c:0xecd6a0,h:3.5,g:"lease",t:"Food Court Seating",d:"Food court seating."},
  service:{l:"Customer Service",c:0xdccfb2,h:5,g:"fac",t:"Guest Services",d:"Guest services."},
  "fnb-kiosk-seating-area":{l:"Kiosk Seating",c:0xc8d9f0,h:3.5,g:"lease",t:"Kiosk Seating Area",d:"Shared kiosk seating."},
  "fc-kitchen":{l:"Food Court",c:0xd28e26,h:5.5,g:"lease",t:"Food Court Hall",d:"The central food court hall."},
  "fv-kitchen":{l:"Food Village",c:0xd99e35,h:5.5,g:"lease",t:"Food Village",d:"The food village."}
};
var DEF = {l:"Unit",c:0xcfd6df,h:5,g:"fac",t:"Unit",d:""};
function cat(k){ return CAT[k] || DEF; }

/* mall contact + per-unit photo pools (served from /images, work over file:// too) */
var CONTACT = {phone:"+971 123 456 789", email:"hello@tilalgrandmall.ae", hours:"10:00 — 22:00"};
function _enc(n){ return "images/" + n.replace(/&/g,"%26").replace(/ /g,"%20"); }
var IMGS = {
  "line-shop":["shop.webp","shop (2).webp","shop (3).webp","shop (4).webp","shop (5).webp","shop (6).webp","shopping.webp","shoops in first floor.webp"],
  anchor:["family shooping.webp","shop (4).webp","shopping.webp"],
  "mini-major":["shop (5).webp","shop (2).webp","family shooping.webp"],
  fnb:["F&b.webp","F&B (3).webp","f&b (2).webp","external food resturant.webp","external first floor f&b.webp"],
  "fnb-cafe":["CAFE.webp","CAFE (2).webp","external caffe.webp"],
  "fnb-kiosk":["F&b KIOSK.webp","F&b KIOSK (2).webp"],
  "fnb-seating":["F&B Seating (5).webp","F&b SEATING (4).webp","F&b seating (2).webp","F&b seating (3).webp"],
  kiosk:["KIOSK.webp","KIOSK (2).webp","KIOSK (3).webp","KIOSK (4).webp","KIOSK (9).webp","kiosk (5).webp","kiosk (6).webp","kiosk (7).webp","kiosk (8).webp"],
  "kiosk-seating":["F&b seating (3).webp","F&b seating (2).webp"],
  "food-court":["food court.webp"], "fc-seating":["food court.webp"],
  "food-village":["food village.webp","food village (2).webp"],
  hypermarket:["hyper market.webp"], cinema:["cinema.webp"],
  fec:["entertarnemnt.webp","edutarnemtn.webp"], "customer-service":["medical.webp"]
};
function imageFor(u){ var pool = IMGS[u.cat];
  if(pool && pool.length){ var h=0, id=u.id||""; for(var i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0; return _enc(pool[h%pool.length]); }
  return ""; }

/* escalator positions (raw plan/viewBox units, Ground + Level 1 only) */
var ESCALATORS = {
  G:[[1370,973],[1068,1081],[1372,1356],[1684,1279],[1995,1360],[2350,1017],[2031,1009],[1031,1275],[1693,1515],[2339,1275],[1315,1180],[2026,1169]],
  F1:[[1370,943],[1985,945],[1002,1022],[1918,1397],[2329,1011],[1704,1481],[2253,1245]]
};
var PLAN_SCALE = 0.11;   // must match tools/build_3d_data.py

var FLOOR_ORDER = ["BL","G","F1"];
var FLOOR_SHORT = {BL:"B", G:"G", F1:"1"};
var FLOOR_SUB = {BL:"Basement", G:"Ground", F1:"Level 1"};

/* ---- CDN loader: classic scripts (work from file://), with a fallback host.
        r137 still ships examples/js global builds, which is why we pin it. ---- */
var CDNS = ["https://cdn.jsdelivr.net/npm/three@0.137.0","https://unpkg.com/three@0.137.0"];
var SCRIPTS = ["/build/three.min.js","/examples/js/controls/OrbitControls.js","/examples/js/utils/BufferGeometryUtils.js"];

function loadFrom(hostIdx){
  var host = CDNS[hostIdx];
  var i = 0;
  (function next(){
    if(i >= SCRIPTS.length){ boot(); return; }
    var s = document.createElement("script");
    s.src = host + SCRIPTS[i];
    s.onload = function(){ i++; next(); };
    s.onerror = function(){
      if(hostIdx + 1 < CDNS.length){ loadFrom(hostIdx + 1); }   // try the other CDN
      else { showLoadError(); }
    };
    document.head.appendChild(s);
  })();
}
function showLoadError(){
  document.getElementById("spinner").style.display = "none";
  document.getElementById("loadLbl").style.display = "none";
  document.getElementById("loadErr").style.display = "block";
}
window.addEventListener("DOMContentLoaded", function(){ loadFrom(0); });

/* ============================ the scene ==================================== */
var renderer, scene, camera, controls, raycaster, ground;
var floorObjs = {}, curFloor = "G", selected = null, highlightMesh = null;
var OFFSET = null, MODEL = {w:200, d:90, h:16};   // shared transform + size
var idleTimer = null, isMobile = matchMedia("(max-width:760px)").matches;

function boot(){
  if(typeof THREE === "undefined"){ showLoadError(); return; }
  try { init(); }
  catch(e){ console.error(e); showLoadError(); }
}

function init(){
  var app = document.getElementById("app");

  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, powerPreference:"high-performance"});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.96;                 // warm filmic glow, but keep colours rich (not washed)
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;     // soft, no acne
  app.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xf3d6ad, 260, 720);        // warm depth haze

  camera = new THREE.PerspectiveCamera(46, window.innerWidth/window.innerHeight, 1, 4000);

  /* ---- golden-hour lighting (calmer fill so category colours stay rich) ---- */
  var hemi = new THREE.HemisphereLight(0xffe9c8, 0x3a3550, 0.42);  // warm sky / cool ground fill
  scene.add(hemi);

  var key = new THREE.DirectionalLight(0xffd29a, 2.05); // warm late-afternoon sun
  key.position.set(165, 150, 78);                       // lower in the sky -> long, defined golden-hour shadows
  key.castShadow = true;
  key.shadow.mapSize.set(isMobile ? 2048 : 4096, isMobile ? 2048 : 4096);  // crisp, no grain
  key.shadow.bias = -0.0004;
  key.shadow.normalBias = 0.8;
  key.shadow.radius = 3.2;                              // soft but readable penumbra
  scene.add(key);
  scene.add(key.target);
  window._key = key;

  var fill = new THREE.DirectionalLight(0xbcd0ff, 0.26); // cool counter-fill so shadows aren't dead
  fill.position.set(-120, 90, -110);
  scene.add(fill);

  /* transparent ground that only catches a soft contact shadow (CSS sky shows through) */
  ground = new THREE.Mesh(new THREE.PlaneGeometry(8000, 8000),
                          new THREE.ShadowMaterial({color:0x36281a, opacity:0.34}));
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -0.02;
  ground.receiveShadow = true;
  scene.add(ground);

  raycaster = new THREE.Raycaster();

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.075;
  controls.maxPolarAngle = 1.45;        // can't dip under the floor
  controls.minPolarAngle = 0.18;
  controls.rotateSpeed = 0.85;
  controls.zoomSpeed = 0.9;
  controls.panSpeed = 0.8;
  controls.screenSpacePanning = false;
  controls.autoRotate = false;          // no drift — the user is in full control
  controls.enablePan = true;

  buildFloorSwitcher();

  /* build the visible floor first, reveal, then build the rest off the critical path */
  buildFloor(curFloor);
  showFloor(curFloor);
  frameModel(true);
  buildLegend();
  hideLoader();
  revealHint();
  applyDeepLink();

  setTimeout(function(){
    FLOOR_ORDER.forEach(function(f){ if(!floorObjs[f]) buildFloor(f); });
  }, 60);

  window.addEventListener("resize", onResize);
  setupPicking();
  document.getElementById("cClose").addEventListener("click", deselect);
  document.getElementById("cLocate").addEventListener("click", locateSelected);
  document.getElementById("cShare").addEventListener("click", shareSelected);
  document.getElementById("lgHead").addEventListener("click", function(){
    document.getElementById("legend").classList.toggle("collapsed");
  });

  animate();
}

/* -------- build shapes for one unit (outer ring + holes) -------- */
function shapesFor(u){
  var out = [];
  for(var i=0;i<u.s.length;i++){
    var sh = u.s[i], o = sh.o;
    if(!o || o.length < 6) continue;
    var shape = new THREE.Shape();
    shape.moveTo(o[0], o[1]);
    for(var k=2;k<o.length;k+=2) shape.lineTo(o[k], o[k+1]);
    if(sh.h){
      for(var hh=0;hh<sh.h.length;hh++){
        var hole = sh.h[hh]; if(hole.length < 6) continue;
        var p = new THREE.Path();
        p.moveTo(hole[0], hole[1]);
        for(var m=2;m<hole.length;m+=2) p.lineTo(hole[m], hole[m+1]);
        shape.holes.push(p);
      }
    }
    out.push(shape);
  }
  return out;
}

/* small units get a smaller bevel so the rounding never eats the footprint */
function bevelFor(u){
  var minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9, o=u.s[0].o;
  for(var i=0;i<o.length;i+=2){ var x=o[i],y=o[i+1];
    if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; }
  var md = Math.min(maxx-minx, maxy-miny);
  return Math.max(0.12, Math.min(0.6, md*0.16));
}

function extrudeUnit(u, height){
  var shapes = shapesFor(u);
  if(!shapes.length) return null;
  var b = bevelFor(u);
  var geo = new THREE.ExtrudeGeometry(shapes, {
    depth: height, bevelEnabled: true,
    bevelThickness: b, bevelSize: b, bevelSegments: 2, steps: 1
  });
  geo.computeVertexNormals();   // smooth shading across the bevel
  return geo;
}

/* -------- escalator markers (floating pins above the concourse) -------- */
var _escTex = null;
function escTexture(){
  if(_escTex) return _escTex;
  var cv = document.createElement("canvas"); cv.width = cv.height = 128;
  var x = cv.getContext("2d");
  function rrect(a,b,w,h,r){ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }
  x.fillStyle = "rgba(33,55,68,0.96)"; rrect(8,8,112,112,30); x.fill();
  x.strokeStyle = "rgba(255,255,255,0.4)"; x.lineWidth = 3; rrect(8,8,112,112,30); x.stroke();
  x.strokeStyle = "#fff"; x.lineWidth = 8; x.lineCap = "round"; x.lineJoin = "round";
  x.beginPath(); x.moveTo(28,98); x.lineTo(48,98); x.lineTo(48,82); x.lineTo(68,82); x.lineTo(68,66); x.lineTo(86,66); x.stroke(); // staircase
  x.beginPath(); x.moveTo(74,52); x.lineTo(86,40); x.lineTo(98,52); x.moveTo(86,40); x.lineTo(86,66); x.stroke();               // up arrow
  _escTex = new THREE.CanvasTexture(cv);
  _escTex.anisotropy = 4; _escTex.encoding = THREE.sRGBEncoding;
  return _escTex;
}
function buildEscalators(fkey, group){
  var list = ESCALATORS[fkey]; if(!list) return;
  var tex = escTexture();
  list.forEach(function(p){
    var sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false, depthTest:true}));
    sp.position.set(p[0]*PLAN_SCALE, p[1]*PLAN_SCALE, 10);   // local; group maps +z -> world +y (height)
    sp.scale.set(7, 7, 1);
    sp.userData.escalator = true;
    group.add(sp);
  });
}

/* -------- build a whole floor: one merged mesh per category -------- */
function buildFloor(fkey){
  var data = FLOORS[fkey]; if(!data) return;
  var group = new THREE.Group();
  var byCat = {};   // cat -> { geos:[], ranges:[{u,start,count}], tri:0 }

  data.units.forEach(function(u){
    try{
      var c = cat(u.cat);
      var geo = extrudeUnit(u, c.h);
      if(!geo) return;
      var tri = (geo.index ? geo.index.count : geo.attributes.position.count) / 3;   // triangle count
      var bucket = byCat[u.cat] || (byCat[u.cat] = {geos:[], ranges:[], tri:0});
      bucket.ranges.push({u:u, start:bucket.tri, count:tri});
      bucket.geos.push(geo);
      bucket.tri += tri;
    }catch(err){ /* one bad polygon must never freeze the scene */ console.warn("unit skipped", u.id, err); }
  });

  var meshes = {};
  Object.keys(byCat).forEach(function(k){
    var bucket = byCat[k]; if(!bucket.geos.length) return;
    var merged = bucket.geos.length === 1 ? bucket.geos[0]
               : THREE.BufferGeometryUtils.mergeBufferGeometries(bucket.geos, false);
    if(!merged) return;
    var c = cat(k);
    var mat = new THREE.MeshStandardMaterial({
      color:c.c, roughness:0.74, metalness:0.0, flatShading:false, side:THREE.DoubleSide
    });
    var mesh = new THREE.Mesh(merged, mat);
    mesh.castShadow = true; mesh.receiveShadow = true;
    mesh.userData.ranges = bucket.ranges;
    mesh.userData.catKey = k;
    group.add(mesh);
    meshes[k] = mesh;
  });

  buildEscalators(fkey, group);

  /* orient: the plan is drawn in the XY plane (y-down). Rotating -90° about X
     lays it flat on the ground (XZ) and sends the extrude axis (+Z) straight
     up (+Y), so every block rises from y=0 and rests on the ground regardless
     of height. (A pure rotation keeps the determinant +1, so face winding,
     holes and normals all stay correct — no inside-out blocks.) */
  group.rotation.x = -Math.PI/2;

  /* one shared transform for every floor so switching never jumps */
  if(!OFFSET){
    var box = new THREE.Box3().setFromObject(group);
    var ctr = box.getCenter(new THREE.Vector3());
    var size = box.getSize(new THREE.Vector3());
    OFFSET = {x:ctr.x, y:box.min.y, z:ctr.z};
    MODEL = {w:size.x, d:size.z, h:size.y};
  }
  group.position.set(-OFFSET.x, -OFFSET.y, -OFFSET.z);
  group.visible = false;
  scene.add(group);
  floorObjs[fkey] = {group:group, meshes:meshes};
}

function showFloor(fkey){
  FLOOR_ORDER.forEach(function(f){ if(floorObjs[f]) floorObjs[f].group.visible = (f === fkey); });
  curFloor = fkey;
  deselect();
  document.querySelectorAll("#floors button").forEach(function(b){
    b.classList.toggle("active", b.dataset.f === fkey);
  });
  buildLegend();
}

/* -------- camera framing from the model size (aspect-aware, so the wide fan
            fits on portrait phones as well as landscape desktops) -------- */
function frameModel(initial){
  if(!initial) return;
  var R = 0.5 * Math.sqrt(MODEL.w*MODEL.w + MODEL.d*MODEL.d + MODEL.h*MODEL.h); // bounding sphere
  var vFov = camera.fov * Math.PI/180;
  var hFov = 2 * Math.atan(Math.tan(vFov/2) * camera.aspect);
  var radius = (R / Math.sin(Math.min(vFov, hFov)/2)) * 1.08;   // fit the sphere in the tighter FOV
  var dir = new THREE.Vector3(0.34, 0.8, 1).normalize();        // warm 3/4 golden-hour angle
  var target = new THREE.Vector3(0, MODEL.h * 0.3, 0);
  camera.position.copy(target).addScaledVector(dir, radius);
  controls.target.copy(target);
  controls.minDistance = R * 0.6;
  controls.maxDistance = radius * 1.8;
  scene.fog.near = radius * 0.55;
  scene.fog.far  = radius * 2.4;
  /* aim the sun's shadow camera to cover the whole model */
  var m = Math.max(MODEL.w, MODEL.d) * 0.72;
  var sc = window._key.shadow.camera;
  sc.left = -m; sc.right = m; sc.top = m; sc.bottom = -m;
  sc.near = 1; sc.far = radius*3; sc.updateProjectionMatrix();
  window._key.target.position.set(0,0,0);
  controls.update();
}

/* -------- UI: floor switcher -------- */
function buildFloorSwitcher(){
  var host = document.getElementById("floors");
  host.innerHTML = "";
  FLOOR_ORDER.forEach(function(f){
    var b = document.createElement("button");
    b.dataset.f = f;
    b.innerHTML = '<span class="lvl">' + FLOOR_SHORT[f] + '</span><span class="nm">' + FLOOR_SUB[f] + '</span>';
    b.title = FLOORS[f].name;
    if(f === curFloor) b.classList.add("active");
    b.addEventListener("click", function(){ if(f !== curFloor){ showFloor(f); } });
    host.appendChild(b);
  });
}

/* -------- UI: legend (toggle categories on/off) -------- */
function buildLegend(){
  var body = document.getElementById("lgBody");
  body.innerHTML = "";
  var fo = floorObjs[curFloor]; if(!fo) return;
  var counts = {};
  FLOORS[curFloor].units.forEach(function(u){ counts[u.cat] = (counts[u.cat]||0)+1; });
  /* leasing first, then facilities; only categories actually present */
  var keys = Object.keys(fo.meshes).sort(function(a,b){
    var ga = cat(a).g === "lease" ? 0:1, gb = cat(b).g === "lease" ? 0:1;
    if(ga !== gb) return ga - gb;
    return (counts[b]||0) - (counts[a]||0);
  });
  keys.forEach(function(k){
    var c = cat(k), mesh = fo.meshes[k];
    var row = document.createElement("div");
    row.className = "row" + (mesh.visible ? "" : " off");
    row.innerHTML = '<span class="sw" style="background:#' + c.c.toString(16).padStart(6,"0") + '"></span>'
      + '<span class="nm">' + c.l + '</span><span class="ct">' + (counts[k]||0) + '</span>';
    row.addEventListener("click", function(){
      mesh.visible = !mesh.visible;
      row.classList.toggle("off", !mesh.visible);
      if(selected && selected.mesh === mesh) deselect();
    });
    body.appendChild(row);
  });
}

/* -------- tap / click picking -------- */
function setupPicking(){
  var el = renderer.domElement, down = null, activePts = 0;
  el.addEventListener("pointerdown", function(e){
    activePts++;
    if(activePts === 1) down = {x:e.clientX, y:e.clientY, t:Date.now()};
    else down = null;     // multi-touch gesture, not a tap
  });
  el.addEventListener("pointerup", function(e){
    activePts = Math.max(0, activePts - 1);
    if(!down) return;
    var dx = e.clientX - down.x, dy = e.clientY - down.y;
    if(Math.abs(dx) < 8 && Math.abs(dy) < 8 && (Date.now() - down.t) < 380) pick(e.clientX, e.clientY);
    down = null;
  });
  el.addEventListener("pointercancel", function(){ activePts = Math.max(0, activePts-1); down = null; });
}

function pick(px, py){
  var fo = floorObjs[curFloor]; if(!fo) return;
  var r = renderer.domElement.getBoundingClientRect();
  var ndc = new THREE.Vector2(((px-r.left)/r.width)*2-1, -((py-r.top)/r.height)*2+1);
  raycaster.setFromCamera(ndc, camera);
  var meshes = []; for(var k in fo.meshes){ if(fo.meshes[k].visible) meshes.push(fo.meshes[k]); }
  var hits = raycaster.intersectObjects(meshes, false);
  if(!hits.length){ deselect(); return; }
  var hit = hits[0], mesh = hit.object, fi = hit.faceIndex, ranges = mesh.userData.ranges, unit = null;
  for(var i=0;i<ranges.length;i++){ if(fi >= ranges[i].start && fi < ranges[i].start + ranges[i].count){ unit = ranges[i].u; break; } }
  if(!unit){ deselect(); return; }
  select(unit, mesh);
}

function select(u, mesh){
  selected = {unit:u, mesh:mesh};
  if(highlightMesh){ highlightMesh.parent.remove(highlightMesh); highlightMesh.geometry.dispose(); highlightMesh = null; }
  var c = cat(u.cat);
  try{
    /* a slightly taller glowing copy. polygonOffset biases it toward the camera
       so its walls win the depth test cleanly against the base block — no
       coplanar z-fighting ("pixel boxes") on the selected unit. */
    var geo = extrudeUnit(u, c.h + 0.6);
    var mat = new THREE.MeshStandardMaterial({
      color:c.c, emissive:0xffb24d, emissiveIntensity:0.9, roughness:0.4, metalness:0.0,
      side:THREE.DoubleSide, polygonOffset:true, polygonOffsetFactor:-4, polygonOffsetUnits:-4
    });
    highlightMesh = new THREE.Mesh(geo, mat);
    highlightMesh.castShadow = true;
    highlightMesh.renderOrder = 2;
    floorObjs[curFloor].group.add(highlightMesh);
  }catch(e){ /* ignore highlight build errors */ }
  showCard(u);
}

function deselect(){
  selected = null;
  if(highlightMesh){ highlightMesh.parent.remove(highlightMesh); highlightMesh.geometry.dispose(); highlightMesh = null; }
  document.getElementById("card").classList.remove("show");
  document.getElementById("legend").classList.remove("cardopen");
}

/* -------- info card -------- */
function hex6(n){ return "#" + n.toString(16).padStart(6,"0"); }
function showCard(u){
  var c = cat(u.cat), col = hex6(c.c);
  var img = document.getElementById("cImg"), hero = document.getElementById("cHero"), photo = imageFor(u);
  if(photo){ img.style.display = "block"; img.src = photo;
    img.onerror = function(){ img.style.display = "none"; }; }
  else { img.style.display = "none"; }
  hero.style.background = "linear-gradient(135deg," + col + "," + shade(c.c,-30) + ")";
  document.getElementById("cDot").style.background = col;
  document.getElementById("cTag").textContent = c.t || c.l;
  document.getElementById("cCode").textContent = u.id || "";
  document.getElementById("cName").textContent = u.name && u.name.trim() ? u.name : c.l;
  document.getElementById("cCat").textContent = c.l + " · " + FLOORS[curFloor].name;
  document.getElementById("cDesc").textContent = c.d || "";
  var meta = document.getElementById("cMeta"); meta.innerHTML = "";
  meta.appendChild(pill("Floor", FLOORS[curFloor].name));
  if(u.m2 && parseFloat(u.m2) > 0){
    var m2 = parseFloat(u.m2);
    meta.appendChild(pill("Area", Math.round(m2).toLocaleString() + " m²"));
    meta.appendChild(pill("", Math.round(m2*10.7639).toLocaleString() + " ft²"));
  }
  document.getElementById("card").classList.add("show");
  if(isMobile) document.getElementById("legend").classList.add("cardopen");
}
function pill(label, val){
  var d = document.createElement("span"); d.className = "pill";
  d.innerHTML = (label ? "<b>" + label + "</b> " : "") + val;
  return d;
}
/* darken/lighten a 0xRRGGBB colour, returning a #hex string */
function shade(n, amt){
  var r = (n>>16)&255, g = (n>>8)&255, b = n&255, f = amt*2.55|0;
  r = Math.max(0,Math.min(255,r+f)); g = Math.max(0,Math.min(255,g+f)); b = Math.max(0,Math.min(255,b+f));
  return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* fly the camera to frame the selected unit's world position */
function locateSelected(){
  if(!selected) return;
  var o = selected.unit.s[0].o, n = o.length/2, sx=0, sy=0;
  for(var i=0;i<o.length;i+=2){ sx+=o[i]; sy+=o[i+1]; }
  var wx = sx/n, wz = sy/n;                     // unit centre in local plan space
  var p = new THREE.Vector3(wx, 0, wz);
  p.applyMatrix4(floorObjs[curFloor].group.matrixWorld);   // -> world
  var dist = Math.max(MODEL.w, MODEL.d) * 0.26;
  var dir = new THREE.Vector3(0.3, 0.86, 1).normalize();
  flyTo(p.clone().addScaledVector(dir, dist), new THREE.Vector3(p.x, cat(selected.unit.cat).h*0.5, p.z));
}
var _fly = null;
function flyTo(camPos, target){
  _fly = {cp0:camera.position.clone(), tp0:controls.target.clone(), cp1:camPos, tp1:target, t:0};
}
function shareSelected(){
  if(!selected) return;
  var u = selected.unit;
  var url = location.origin + location.pathname + "?floor=" + curFloor + "&unit=" + encodeURIComponent(u.id||"");
  var name = (u.name && u.name.trim()) ? u.name : cat(u.cat).l;
  if(navigator.share){ navigator.share({title:"Tilal Mall · " + name, url:url}).catch(function(){}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){ toast("Link copied"); }, function(){ toast(url); }); }
  else { toast(url); }
}
var _toastT = null;
function toast(msg){
  var el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show");
  clearTimeout(_toastT); _toastT = setTimeout(function(){ el.classList.remove("show"); }, 2200);
}

/* open a shared ?floor=&unit= link straight to that unit */
function selectById(id){
  var fo = floorObjs[curFloor]; if(!fo || !id) return false;
  for(var k in fo.meshes){ var rs = fo.meshes[k].userData.ranges;
    for(var i=0;i<rs.length;i++){ if(rs[i].u.id === id){ select(rs[i].u, fo.meshes[k]); locateSelected(); return true; } } }
  return false;
}
function applyDeepLink(){
  var q; try{ q = new URLSearchParams(location.search); }catch(e){ return; }
  var f = q.get("floor"), id = q.get("unit");
  if(f && FLOORS[f] && f !== curFloor){ if(!floorObjs[f]) buildFloor(f); showFloor(f); }
  if(id) selectById(id);
}

/* -------- keep the model in frame: clamp the pan target to a box around the
            origin (and shift the camera by the same amount so it never jerks),
            so the plan can't drift off-screen no matter how you pan. -------- */
function clampView(){
  if(!MODEL) return;
  var t = controls.target, lx = MODEL.w*0.5, lz = MODEL.d*0.6, ly = MODEL.h*1.3;
  var nx = Math.max(-lx, Math.min(lx, t.x)),
      nz = Math.max(-lz, Math.min(lz, t.z)),
      ny = Math.max(0,   Math.min(ly, t.y));
  if(nx!==t.x || ny!==t.y || nz!==t.z){
    camera.position.x += nx - t.x; camera.position.y += ny - t.y; camera.position.z += nz - t.z;
    t.set(nx, ny, nz);
  }
}
function revealHint(){
  var h = document.getElementById("hint"); h.classList.add("show");
  setTimeout(function(){ h.classList.remove("show"); }, 5200);
}

/* -------- loop & resize -------- */
function animate(){
  requestAnimationFrame(animate);
  if(_fly){
    _fly.t = Math.min(1, _fly.t + 0.045);
    var e = 1 - Math.pow(1 - _fly.t, 3);            // ease-out
    camera.position.lerpVectors(_fly.cp0, _fly.cp1, e);
    controls.target.lerpVectors(_fly.tp0, _fly.tp1, e);
    if(_fly.t >= 1) _fly = null;
  }
  controls.update();
  clampView();
  renderer.render(scene, camera);
}
function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  isMobile = matchMedia("(max-width:760px)").matches;
}
function hideLoader(){ var l = document.getElementById("loader"); l.classList.add("hide"); setTimeout(function(){ l.style.display = "none"; }, 650); }
</script>
